    <!-- הגדרת מפת ייבוא (Import Map) עם גרסאות מסונכרנות -->

    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0",
            "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",

            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",

    <!-- טעינת Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Custom Scrollbar for Nav */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }

        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }

<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Plus, Search, ExternalLink, Bot, Trash2, Edit3, Settings,
            Sparkles, X, ShieldAlert, Pin, Send, Layout, Copy, 
            CheckCircle2, Moon, Sun, Share2, Lightbulb, 
            ChevronLeft, Menu, FileText, Activity, Shield, MessageSquare, Star, Users, Upload, Lock, KeyRound, Eye, Home, Zap, GraduationCap, ArrowLeft, Crown, Megaphone, Calendar, Image as ImageIcon
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { 
            getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, addDoc, writeBatch, initializeFirestore 
        } from 'firebase/firestore';
        import { 
            getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged 
        } from 'firebase/auth';

        // ------------------------------------------------------------------
        // הגדרות Firebase
        // ------------------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyA6KhfU00AGpVQyxBEtgfOL5Ss7mMiWYXU",
            authDomain: "drugs-triage.firebaseapp.com",
            projectId: "drugs-triage",
            storageBucket: "drugs-triage.firebasestorage.app",
            messagingSenderId: "97433969938",
            appId: "1:97433969938:web:5910d37e0d8cd7f680bfcb",
            measurementId: "G-953D58H2H5"
        };

        const isConfigured = Object.keys(firebaseConfig).length > 0;
        
        let app, auth, db;
        if (isConfigured) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            // אתחול Firestore עם הגדרה למניעת ניתוקים (Long Polling)
            db = initializeFirestore(app, { experimentalForceLongPolling: true });
        }

        const appId = 'gems-portal';

        // --- Assets & Constants ---
        const DIFS_LOGO = "logo.png"; 
        const MOP_LOGO = "לוגו מדור מופ.png";
        const AHM_LOGO = "לוגו אחמ.png";

        const CATEGORIES = [
            { id: 'about', label: 'דף הבית', subtitle: 'אודות המערכת', icon: Home, color: 'slate' },
            { id: 'internal', label: 'מערכות ובוטים', subtitle: 'כלים פנימיים', icon: Bot, color: 'blue' },
            { id: 'tool', label: 'כלי בינה מלאכותית', subtitle: 'AI גנרטיבי', icon: Sparkles, color: 'emerald' },
            { id: 'training', label: 'הדרכות וסרטונים', subtitle: 'ספרייה מקצועית', icon: FileText, color: 'amber' },
            { id: 'updates', label: 'עדכונים והודעות', subtitle: 'חדשות ואירועים', icon: Megaphone, color: 'purple' }
        ];

        // --- Helper Function: Convert Google Drive Link to Direct Image Link ---
        const getDirectImageUrl = (url) => {
            if (!url) return '';
            const idMatch = url.match(/\/d\/([-_\w]+)/) || url.match(/id=([-_\w]+)/);
            if (idMatch && idMatch[1]) {
                return `https://lh3.googleusercontent.com/d/${idMatch[1]}`;
            }
            return url;
        };

        const App = () => {
            // --- State ---
            const [user, setUser] = useState(null);
            const [items, setItems] = useState([]);
            const [feedbacks, setFeedbacks] = useState({});
            const [searchTerm, setSearchTerm] = useState('');
            const [activeTab, setActiveTab] = useState('about');
            const [isAdmin, setIsAdmin] = useState(false);
            
            // Modals
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isFeedbackModalOpen, setIsFeedbackModalOpen] = useState(false);
            const [isReviewsModalOpen, setIsReviewsModalOpen] = useState(false);
            const [isImportModalOpen, setIsImportModalOpen] = useState(false);
            const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);
            const [isViewModalOpen, setIsViewModalOpen] = useState(false);
            
            // Editing & Selection
            const [editingItem, setEditingItem] = useState(null);
            const [feedbackItem, setFeedbackItem] = useState(null);
            const [reviewsItem, setReviewsItem] = useState(null);
            const [viewItem, setViewItem] = useState(null);
            
            // Initialize pinned items from LocalStorage
            const [pinnedItems, setPinnedItems] = useState(() => {
                try {
                    const saved = localStorage.getItem('difs_pinned_items');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) {
                    return [];
                }
            });
            
            // Forms
            // Added imageUrl to formData
            const [formData, setFormData] = useState({ title: '', description: '', url: '', imageUrl: '', category: 'internal', status: 'active', isFeatured: false, eventDate: '' });
            const [feedbackData, setFeedbackData] = useState({ rating: 5, text: '' });
            const [jsonInput, setJsonInput] = useState('');
            const [loginPassword, setLoginPassword] = useState('');

            // UI State
            const [darkMode, setDarkMode] = useState(false);
            const [toast, setToast] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(false); 

            // --- Logic ---
            
            useEffect(() => {
                try {
                    localStorage.setItem('difs_pinned_items', JSON.stringify(pinnedItems));
                } catch (e) {
                    console.error("Failed to save pins", e);
                }
            }, [pinnedItems]);

            const greeting = useMemo(() => {
                const h = new Date().getHours();
                return h < 12 ? 'בוקר טוב' : h < 17 ? 'צהריים טובים' : h < 21 ? 'ערב טוב' : 'לילה טוב';
            }, []);

            useEffect(() => {
                if (!isConfigured) return;
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (error) {
                        console.error("Auth Error:", error);
                    }
                };
                initAuth();
                onAuthStateChanged(auth, setUser);
            }, []);

            // Fetch Items
            useEffect(() => {
                if (!user || !db) return;
                const unsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'portalItems'), 
                    (snap) => setItems(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
                    (err) => console.error(err)
                );
                return () => unsub();
            }, [user]);

            // Fetch Feedbacks
            useEffect(() => {
                if (!user || !db) return;
                const unsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'feedbacks'), 
                    (snap) => {
                        const map = {};
                        snap.docs.forEach(doc => {
                            const data = doc.data();
                            if (!map[data.itemId]) {
                                map[data.itemId] = { totalRating: 0, count: 0, reviews: [] };
                            }
                            map[data.itemId].totalRating += data.rating;
                            map[data.itemId].count += 1;
                            if (data.text && data.text.trim().length > 0) {
                                map[data.itemId].reviews.push({ 
                                    text: data.text, 
                                    rating: data.rating, 
                                    date: data.createdAt 
                                });
                            }
                        });
                        setFeedbacks(map);
                    },
                    (err) => console.error("Feedbacks error:", err)
                );
                return () => unsub();
            }, [user]);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
            
            const handleSave = async (e) => {
                e.preventDefault();
                if (!user) return;
                const id = editingItem?.id || crypto.randomUUID();
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'portalItems', id), { ...formData, updatedAt: new Date().toISOString() });
                setIsModalOpen(false); setEditingItem(null); 
                setFormData({ title: '', description: '', url: '', imageUrl: '', category: activeTab, status: 'active', isFeatured: false, eventDate: '' });
                showToast('הפריט נשמר בהצלחה');
            };

            const handleDelete = async (id) => {
                if (!user || !window.confirm('למחוק פריט זה?')) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'portalItems', id));
                showToast('הפריט נמחק');
            };

            const handleSendFeedback = async (e) => {
                e.preventDefault();
                if (!user || !feedbackItem) return;
                
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'feedbacks'), {
                        itemId: feedbackItem.id,
                        itemTitle: feedbackItem.title,
                        rating: feedbackData.rating,
                        text: feedbackData.text,
                        createdAt: new Date().toISOString()
                    });
                    setIsFeedbackModalOpen(false);
                    setFeedbackData({ rating: 5, text: '' });
                    setFeedbackItem(null);
                    showToast('הדירוג התקבל, תודה!');
                } catch (err) {
                    console.error(err);
                    showToast('שגיאה בשליחת הדירוג');
                }
            };

            const toggleGlobalFeatured = async (item) => {
                if (!user || !isAdmin) return;
                try {
                    const newFeaturedState = !item.isFeatured;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'portalItems', item.id), { 
                        ...item, 
                        isFeatured: newFeaturedState 
                    }, { merge: true });
                    showToast(newFeaturedState ? 'סומן כמומלץ מערכת (לכולם)' : 'הוסר ממומלצי המערכת');
                } catch (e) {
                    console.error(e);
                    showToast('שגיאה בעדכון');
                }
            };

            const handleBulkImport = async () => {
                if (!jsonInput) return;
                try {
                    const data = JSON.parse(jsonInput);
                    if (!Array.isArray(data)) throw new Error("הפורמט חייב להיות רשימה (Array)");
                    
                    const batch = writeBatch(db);
                    let count = 0;
                    
                    data.forEach(item => {
                        if (item.title && item.url) {
                            const newId = crypto.randomUUID();
                            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'portalItems', newId);
                            batch.set(ref, {
                                title: item.title,
                                description: item.description || '',
                                url: item.url,
                                imageUrl: item.imageUrl || '',
                                category: item.category || 'internal',
                                status: item.status || 'active',
                                isFeatured: false,
                                updatedAt: new Date().toISOString()
                            });
                            count++;
                        }
                    });
                    
                    await batch.commit();
                    setIsImportModalOpen(false);
                    setJsonInput('');
                    showToast(`${count} פריטים יובאו בהצלחה!`);
                } catch (e) {
                    alert("שגיאה בייבוא: " + e.message);
                }
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (loginPassword === '123456') {
                    setIsAdmin(true);
                    setIsLoginModalOpen(false);
                    setLoginPassword('');
                    showToast('התחברת כמנהל מערכת');
                } else {
                    alert('סיסמה שגויה');
                }
            };

            const filteredItems = useMemo(() => items
                .filter(i => i.category === activeTab)
                .filter(i => i.title.toLowerCase().includes(searchTerm.toLowerCase()) || i.description.toLowerCase().includes(searchTerm.toLowerCase()))
                .sort((a, b) => {
                    if (a.isFeatured && !b.isFeatured) return -1;
                    if (!a.isFeatured && b.isFeatured) return 1;
                    const aPinned = pinnedItems.includes(a.id);
                    const bPinned = pinnedItems.includes(b.id);
                    if (aPinned && !bPinned) return -1;
                    if (!aPinned && bPinned) return 1;
                    return 0;
                }), 
            [items, activeTab, searchTerm, pinnedItems]);

            // --- UI Components ---
            const SidebarItem = ({ cat }) => {
                const isActive = activeTab === cat.id;
                const Icon = cat.icon;
                return (
                    <button 
                        onClick={() => { setActiveTab(cat.id); setSidebarOpen(false); }}
                        className={`w-full flex items-center gap-4 px-4 py-4 rounded-2xl transition-all duration-300 group ${
                            isActive 
                                ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' 
                                : `${darkMode ? 'text-slate-400 hover:bg-slate-800' : 'text-slate-500 hover:bg-white hover:shadow-sm'}`
                        }`}
                    >
                        <div className={`p-2 rounded-xl transition-colors ${isActive ? 'bg-white/20' : 'bg-transparent group-hover:bg-slate-200/50 dark:group-hover:bg-slate-700'}`}>
                            <Icon size={20} />
                        </div>
                        <div className="text-right">
                            <div className={`font-bold text-sm ${isActive ? 'text-white' : 'text-slate-700 dark:text-slate-200'}`}>{cat.label}</div>
                            <div className={`text-[10px] font-medium ${isActive ? 'text-blue-100' : 'text-slate-400'}`}>{cat.subtitle}</div>
                        </div>
                    </button>
                );
            };

            const AboutPage = () => {
                const internalCount = items.filter(i => i.category === 'internal').length;
                const toolCount = items.filter(i => i.category === 'tool').length;
                const trainingCount = items.filter(i => i.category === 'training').length;
                const updatesCount = items.filter(i => i.category === 'updates').length;

                return (
                    // FIX: Changed h-full justify-center to flex-col with dynamic height and spacing for mobile scroll
                    <div className="animate-in fade-in duration-500 w-full flex flex-col justify-start lg:justify-center min-h-full max-w-6xl mx-auto space-y-8 pb-10">
                        {/* Compact Hero Section */}
                        <div className={`relative overflow-hidden rounded-[2.5rem] p-8 ${darkMode ? 'bg-gradient-to-br from-indigo-950 to-slate-900 border border-slate-800' : 'bg-gradient-to-br from-blue-600 to-indigo-700 text-white shadow-xl shadow-blue-900/20'}`}>
                            <div className="absolute top-0 left-0 w-full h-full overflow-hidden opacity-20 pointer-events-none">
                                <div className="absolute top-0 right-0 w-96 h-96 bg-white rounded-full blur-[100px] -translate-y-1/2 translate-x-1/2"></div>
                                <div className="absolute bottom-0 left-0 w-64 h-64 bg-indigo-400 rounded-full blur-[80px] translate-y-1/3 -translate-x-1/3"></div>
                            </div>
                            
                            <div className="relative z-10 flex flex-col items-center text-center max-w-3xl mx-auto space-y-4">
                                <div className={`inline-flex items-center gap-2 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest ${darkMode ? 'bg-white/10 text-indigo-300 border border-white/10' : 'bg-white/20 text-blue-50 border border-white/20'}`}>
                                    <Sparkles size={12} />
                                    <span>DIFS Innovation</span>
                                </div>
                                <h2 className={`text-3xl md:text-4xl font-black tracking-tight leading-tight ${darkMode ? 'text-white' : 'text-white'}`}>
                                    מרכז החדשנות והבינה המלאכותית
                                </h2>
                                <p className={`text-base md:text-lg font-medium leading-relaxed max-w-xl ${darkMode ? 'text-slate-300' : 'text-blue-50'}`}>
                                    הפלטפורמה המרכזית של החטיבה לזיהוי פלילי המאגדת בוטים מתקדמים, כלי AI חיצוניים ומאגר הדרכות מקצועי.
                                </p>
                            </div>
                        </div>

                        {/* Features Grid with Counters */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                            <div onClick={() => setActiveTab('internal')} className={`cursor-pointer p-6 rounded-[2rem] border transition-all hover:-translate-y-1 hover:shadow-lg group relative overflow-hidden ${darkMode ? 'bg-slate-900 border-slate-800 hover:border-blue-500/50' : 'bg-white border-slate-100 hover:border-blue-100 hover:shadow-blue-500/5'}`}>
                                <div className="flex justify-between items-start mb-4">
                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-colors ${darkMode ? 'bg-blue-900/30 text-blue-400 group-hover:bg-blue-600 group-hover:text-white' : 'bg-blue-50 text-blue-600 group-hover:bg-blue-600 group-hover:text-white'}`}>
                                        <Bot size={24} />
                                    </div>
                                    <span className={`text-xs font-black px-2.5 py-1 rounded-lg ${darkMode ? 'bg-slate-800 text-slate-300' : 'bg-slate-100 text-slate-600'}`}>
                                        {internalCount}
                                    </span>
                                </div>
                                <h3 className="text-lg font-black mb-2 text-slate-800 dark:text-white">מערכות ובוטים</h3>
                                <p className="text-slate-500 dark:text-slate-400 leading-relaxed text-xs mb-4 h-10 line-clamp-2">
                                    פיתוחים ייעודיים של מדור מו"פ המותאמים לצרכי העבודה הפורנזית.
                                </p>
                                <span className="text-xs font-bold text-blue-600 dark:text-blue-400 flex items-center gap-1 group-hover:gap-2 transition-all">
                                    כניסה למאגר <ArrowLeft size={14} />
                                </span>
                            </div>

                            <div onClick={() => setActiveTab('tool')} className={`cursor-pointer p-6 rounded-[2rem] border transition-all hover:-translate-y-1 hover:shadow-lg group relative overflow-hidden ${darkMode ? 'bg-slate-900 border-slate-800 hover:border-emerald-500/50' : 'bg-white border-slate-100 hover:border-emerald-100 hover:shadow-emerald-500/5'}`}>
                                <div className="flex justify-between items-start mb-4">
                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-colors ${darkMode ? 'bg-emerald-900/30 text-emerald-400 group-hover:bg-emerald-600 group-hover:text-white' : 'bg-emerald-50 text-emerald-600 group-hover:bg-emerald-600 group-hover:text-white'}`}>
                                        <Sparkles size={24} />
                                    </div>
                                    <span className={`text-xs font-black px-2.5 py-1 rounded-lg ${darkMode ? 'bg-slate-800 text-slate-300' : 'bg-slate-100 text-slate-600'}`}>
                                        {toolCount}
                                    </span>
                                </div>
                                <h3 className="text-lg font-black mb-2 text-slate-800 dark:text-white">כלי AI חיצוניים</h3>
                                <p className="text-slate-500 dark:text-slate-400 leading-relaxed text-xs mb-4 h-10 line-clamp-2">
                                    ריכוז הכלים המתקדמים ביותר ברשת לשימוש מחקרי וכללי.
                                </p>
                                <span className="text-xs font-bold text-emerald-600 dark:text-emerald-400 flex items-center gap-1 group-hover:gap-2 transition-all">
                                    גלה כלים <ArrowLeft size={14} />
                                </span>
                            </div>

                            <div onClick={() => setActiveTab('training')} className={`cursor-pointer p-6 rounded-[2rem] border transition-all hover:-translate-y-1 hover:shadow-lg group relative overflow-hidden ${darkMode ? 'bg-slate-900 border-slate-800 hover:border-amber-500/50' : 'bg-white border-slate-100 hover:border-amber-100 hover:shadow-amber-500/5'}`}>
                                <div className="flex justify-between items-start mb-4">
                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-colors ${darkMode ? 'bg-amber-900/30 text-amber-400 group-hover:bg-amber-500 group-hover:text-white' : 'bg-amber-50 text-amber-600 group-hover:bg-amber-500 group-hover:text-white'}`}>
                                        <GraduationCap size={24} />
                                    </div>
                                    <span className={`text-xs font-black px-2.5 py-1 rounded-lg ${darkMode ? 'bg-slate-800 text-slate-300' : 'bg-slate-100 text-slate-600'}`}>
                                        {trainingCount}
                                    </span>
                                </div>
                                <h3 className="text-lg font-black mb-2 text-slate-800 dark:text-white">מרכז ידע והדרכה</h3>
                                <p className="text-slate-500 dark:text-slate-400 leading-relaxed text-xs mb-4 h-10 line-clamp-2">
                                    ספריית הדרכות, מדריכים וסרטונים ללימוד השימוש ב-AI.
                                </p>
                                <span className="text-xs font-bold text-amber-600 dark:text-amber-400 flex items-center gap-1 group-hover:gap-2 transition-all">
                                    התחל ללמוד <ArrowLeft size={14} />
                                </span>
                            </div>

                            <div onClick={() => setActiveTab('updates')} className={`cursor-pointer p-6 rounded-[2rem] border transition-all hover:-translate-y-1 hover:shadow-lg group relative overflow-hidden ${darkMode ? 'bg-slate-900 border-slate-800 hover:border-purple-500/50' : 'bg-white border-slate-100 hover:border-purple-100 hover:shadow-purple-500/5'}`}>
                                <div className="flex justify-between items-start mb-4">
                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-colors ${darkMode ? 'bg-purple-900/30 text-purple-400 group-hover:bg-purple-600 group-hover:text-white' : 'bg-purple-50 text-purple-600 group-hover:bg-purple-600 group-hover:text-white'}`}>
                                        <Megaphone size={24} />
                                    </div>
                                    <span className={`text-xs font-black px-2.5 py-1 rounded-lg ${darkMode ? 'bg-slate-800 text-slate-300' : 'bg-slate-100 text-slate-600'}`}>
                                        {updatesCount}
                                    </span>
                                </div>

                    {isViewModalOpen && viewItem && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in">
                            <div className={`w-full max-w-lg rounded-3xl p-8 shadow-2xl flex flex-col max-h-[85vh] ${darkMode ? 'bg-slate-900 border border-slate-700' : 'bg-white'}`}>
                                <div className="flex justify-between items-start mb-6 shrink-0">
                                    <div className="pr-2">
                                        <h3 className="text-2xl font-black text-slate-800 dark:text-white leading-tight">{viewItem.title}</h3>
                                        <p className="text-xs text-slate-500 mt-1 font-bold uppercase tracking-wider">{CATEGORIES.find(c => c.id === viewItem.category)?.label}</p>
                                    </div>
                                    <button onClick={() => setIsViewModalOpen(false)} className={`p-2 rounded-xl transition-colors ${darkMode ? 'hover:bg-slate-800 text-slate-400' : 'hover:bg-slate-100 text-slate-500'}`}><X size={24} /></button>
                                </div>
                                
                                <div className="flex-grow overflow-y-auto pr-2 mb-6">
                                    {/* Image Display with Error Handling */}
                                    {viewItem.imageUrl && (
                                        <div className="mb-6 rounded-2xl overflow-hidden shadow-md bg-slate-100 dark:bg-slate-800 relative min-h-[100px] flex items-center justify-center">
                                            <img 
                                                src={getDirectImageUrl(viewItem.imageUrl)} 
                                                alt={viewItem.title} 
                                                className="w-full h-auto object-cover" 
                                                onError={(e) => {
                                                    e.target.style.display = 'none'; // Hide broken image
                                                    e.target.parentElement.style.display = 'none'; // Hide container
                                                }}
                                            />
                                        </div>
                                    )}
                                    <p className={`text-base leading-relaxed whitespace-pre-wrap ${darkMode ? 'text-slate-300' : 'text-slate-600'}`}>
                                        {viewItem.description}
                                    </p>
                                </div>

                                <div className="shrink-0 pt-6 border-t border-slate-100 dark:border-slate-800">
                                    {viewItem.url && (
                                        <a 
                                            href={viewItem.url} 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className={`flex items-center justify-center gap-2 w-full py-3.5 rounded-xl font-bold text-base transition-all shadow-lg ${
                                                viewItem.category === 'internal' 
                                                    ? 'bg-blue-600 hover:bg-blue-700 text-white shadow-blue-900/20'
                                                : viewItem.category === 'tool' 
                                                    ? 'bg-emerald-600 hover:bg-emerald-700 text-white shadow-emerald-900/20'
                                                : viewItem.category === 'training' 
                                                    ? 'bg-amber-500 hover:bg-amber-600 text-white shadow-amber-900/20'
                                                : 'bg-purple-600 hover:bg-purple-700 text-white shadow-purple-900/20'
                                            }`}
                                        >
                                            <span>
                                                {viewItem.category === 'internal' ? 'הפעל כלי' : 
                                                 viewItem.category === 'training' ? 'פתח קישור' : 
                                                 viewItem.category === 'updates' ? 'פרטים נוספים' : 
                                                 'פתח כלי'}
                                            </span>
                                            <ExternalLink size={18} />
                                        </a>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Login Modal */}
                    {isLoginModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in">
                            <div className={`w-full max-w-sm rounded-3xl p-8 shadow-2xl text-center ${darkMode ? 'bg-slate-900 border border-slate-700' : 'bg-white'}`}>
                                <div className="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-4 text-blue-600"><Lock size={32}/></div>
                                <h3 className="text-xl font-black mb-4 text-slate-800 dark:text-white">כניסה למנהל מערכת</h3>
                                <form onSubmit={handleAdminLogin} className="space-y-4">
                                    <div className="relative">
                                        <KeyRound className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5" />
                                        <input 
                                            type="password" 
                                            placeholder="סיסמה" 
                                            className="w-full pr-12 pl-4 py-3 rounded-xl border bg-transparent outline-none focus:border-blue-500 dark:border-slate-700" 
                                            value={loginPassword}
                                            onChange={e => setLoginPassword(e.target.value)}
                                            autoFocus
                                        />
                                    </div>
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setIsLoginModalOpen(false)} className="flex-1 py-3 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl font-bold">ביטול</button>
                                        <button type="submit" className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">כניסה</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Admin Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in">
                            <div className={`w-full max-w-lg rounded-3xl p-8 shadow-2xl ${darkMode ? 'bg-slate-900 border border-slate-700' : 'bg-white'}`}>
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-black text-slate-800 dark:text-white">ניהול פריט</h3>
                                    <button onClick={() => setIsModalOpen(false)}><X className="text-slate-400" /></button>
                                </div>
                                <form onSubmit={handleSave} className="space-y-4">
                                    <input required placeholder="שם הפריט" className="w-full p-3 rounded-xl border bg-transparent outline-none focus:border-blue-500 dark:border-slate-700" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                                    <input 
                                        required={formData.category !== 'updates'} 
                                        placeholder={formData.category === 'updates' ? "URL (אופציונלי)" : "URL"}
                                        dir="ltr" 
                                        className="w-full p-3 rounded-xl border bg-transparent outline-none focus:border-blue-500 dark:border-slate-700 text-left" 
                                        value={formData.url} 
                                        onChange={e => setFormData({...formData, url: e.target.value})} 
                                    />
                                    <input 
                                        placeholder="קישור לתמונה (אופציונלי)" 
                                        dir="ltr" 
                                        className="w-full p-3 rounded-xl border bg-transparent outline-none focus:border-blue-500 dark:border-slate-700 text-left" 
                                        value={formData.imageUrl || ''} 
                                        onChange={e => setFormData({...formData, imageUrl: e.target.value})} 
                                    />
                                    <select className="w-full p-3 rounded-xl border bg-transparent outline-none focus:border-blue-500 dark:border-slate-700 dark:bg-slate-900" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                        {CATEGORIES.slice(1).map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                                    </select>

                                    {formData.category === 'updates' && (
                                        <input 
                                            type="date" 
                                            className="w-full p-3 rounded-xl border bg-transparent outline-none focus:border-blue-500 dark:border-slate-700" 
                                            value={formData.eventDate || ''} 
                                            onChange={e => setFormData({...formData, eventDate: e.target.value})}
                                        />
                                    )}

                                    <textarea rows="3" placeholder="תיאור" className="w-full p-3 rounded-xl border bg-transparent outline-none focus:border-blue-500 dark:border-slate-700" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} />
                                    <button className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">שמור</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Import Modal */}
                    {isImportModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in">
                            <div className={`w-full max-w-2xl rounded-3xl p-8 shadow-2xl ${darkMode ? 'bg-slate-900 border border-slate-700' : 'bg-white'}`}>
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-black text-slate-800 dark:text-white">ייבוא המוני (JSON)</h3>
                                    <button onClick={() => setIsImportModalOpen(false)}><X className="text-slate-400" /></button>
                                </div>
                                <div className="space-y-4">
                                    <p className="text-sm text-slate-500">
                                        הדבק כאן רשימת אובייקטים בפורמט JSON. דוגמה: <br/>
                                        <code className="bg-gray-100 dark:bg-slate-800 px-1 py-0.5 rounded" dir="ltr">[{`{"title":"כלי 1", "url":"...", "description":"...", "category":"internal"}`}]</code>
                                    </p>
                                    <textarea 
                                        rows="10" 
                                        className="w-full p-4 rounded-xl border bg-transparent outline-none focus:border-blue-500 dark:border-slate-700 font-mono text-sm" 
                                        dir="ltr"
                                        value={jsonInput}
                                        onChange={e => setJsonInput(e.target.value)}
                                    ></textarea>
                                    <button onClick={handleBulkImport} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">בצע ייבוא</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Feedback Modal */}
                    {isFeedbackModalOpen && feedbackItem && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in">
                            <div className={`w-full max-w-md rounded-3xl p-8 shadow-2xl ${darkMode ? 'bg-slate-900 border border-slate-700' : 'bg-white'}`}>
                                <div className="flex justify-between items-center mb-6">
                                    <div>
                                        <h3 className="text-xl font-black text-slate-800 dark:text-white">דירוג כלי</h3>
                                        <p className="text-xs text-slate-500">{feedbackItem.title}</p>
                                    </div>
                                    <button onClick={() => setIsFeedbackModalOpen(false)}><X className="text-slate-400" /></button>
                                </div>
                                <form onSubmit={handleSendFeedback} className="space-y-6">
                                    <div className="flex justify-center gap-2">
                                        {[1, 2, 3, 4, 5].map((star) => (
                                            <button
                                                key={star}
                                                type="button"
                                                onClick={() => setFeedbackData({ ...feedbackData, rating: star })}
                                                className={`p-2 transition-transform hover:scale-110 ${feedbackData.rating >= star ? 'text-amber-400' : 'text-slate-300'}`}
                                            >
                                                <Star size={32} fill={feedbackData.rating >= star ? "currentColor" : "none"} />
                                            </button>
                                        ))}
                                    </div>
                                    <textarea 
                                        rows="3" 
                                        placeholder="הערה (אופציונלי)" 
                                        className="w-full p-4 rounded-xl border bg-transparent outline-none focus:border-blue-500 dark:border-slate-700 resize-none" 
                                        value={feedbackData.text} 
                                        onChange={e => setFeedbackData({...feedbackData, text: e.target.value})} 
                                    />
                                    <button className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 flex items-center justify-center gap-2">
                                        <Send size={18} />
                                        שלח דירוג
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Reviews View Modal */}
                    {isReviewsModalOpen && reviewsItem && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in">
                            <div className={`w-full max-w-lg rounded-3xl p-8 shadow-2xl flex flex-col max-h-[80vh] ${darkMode ? 'bg-slate-900 border border-slate-700' : 'bg-white'}`}>
                                <div className="flex justify-between items-center mb-6 shrink-0">
                                    <div>
                                        <h3 className="text-xl font-black text-slate-800 dark:text-white">ביקורות משתמשים</h3>
                                        <p className="text-xs text-slate-500">{reviewsItem.title}</p>
                                    </div>
                                    <button onClick={() => setIsReviewsModalOpen(false)}><X className="text-slate-400" /></button>
                                </div>
                                
                                <div className="flex-grow overflow-y-auto space-y-4 pr-2">
                                    {reviewsItem.reviews.length === 0 ? (
                                        <p className="text-center text-slate-400 py-10">אין ביקורות מילוליות לכלי זה</p>
                                    ) : (
                                        reviewsItem.reviews.map((rev, idx) => (
                                            <div key={idx} className={`p-4 rounded-2xl ${darkMode ? 'bg-slate-800' : 'bg-slate-50'}`}>
                                                <div className="flex items-center gap-2 mb-2">
                                                    <div className="flex text-amber-400">
                                                        {[...Array(rev.rating)].map((_, i) => <Star key={i} size={12} fill="currentColor" />)}
                                                    </div>
                                                    <span className="text-[10px] text-slate-400">{new Date(rev.date).toLocaleDateString('he-IL')}</span>
                                                </div>
                                                <p className={`text-sm ${darkMode ? 'text-slate-300' : 'text-slate-600'}`}>"{rev.text}"</p>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
